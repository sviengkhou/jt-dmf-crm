apiVersion: mxl.media.fn/v1alpha1
kind: MxlMediaFunctionParameters
metadata:
  name: writer-1080p25-v210
  namespace: media
spec:
  role: writer
  flow:
    label: "studio-cam-1"

  # Media input specifications
  inputs:
    - name: "primary-feed"
      media:
        type: video
        format:
          pixelFormat: v210
          resolution:
            width: 1920
            height: 1080
          fps: "25/1"
    - name: "secondary-feed"
      media:
        type: video
        format:
          pixelFormat: v210
          resolution:
            width: 1920
            height: 1080
          fps: "25/1"


outputs:

  # TODO 
  # Have section with capabilites and scenario -- Could be free text.
  # Maybe an array of cases. 
  # Driver-facing compute hints (not enforced by Kubernetes unless a mutating webhook
  # copies them into Pod resources.requests/limits)
  compute:
    cpuLimit: "2000m"            # desired cap for container
    cpuClass: "performance"      # driver-defined tier (e.g., latency|balanced|performance)
    memoryRequired: "4Gi"        # working set RAM expected by the function

  # NEW: host platform capabilities (inventory/hints for driver-side placement logic)
  hostCapabilities:
    cpu:
      class: "intel-xeon-spr"    # free-form: e.g., "intel-xeon-gold", "amd-epyc"
      sockets: 2
      coresPerSocket: 32
      # Selected CPU features discovered via NFD or cpuid
      features:
        - AVX512F
        - AVX512DQ
        - SGX
      numa:
        - id: 0
          cpus: "0-31"           # optional: CPU set notation
        - id: 1
          cpus: "32-63"

    nic:
      # High-level NIC inventory and SR-IOV capabilities
      vendorId: "15b3"           # Mellanox/NVIDIA PCI vendor
      model: "ConnectX-7"
      ports:
        - name: "ens1f0"
          speedGbps: 200
          pciAddress: "0000:a1:00.0"
          numaNode: 0
        - name: "ens1f1"
          speedGbps: 200
          pciAddress: "0000:a1:00.1"
          numaNode: 1
      sriov:
        supported: true
        pfCount: 2
        vfPerPf: 64
        # If the NIC/driver supports rate caps per VF, expose expected envelope:
        minTxRateMbps: 0
        maxTxRateMbps: 100000
        features:
          - rdma
          - roce
          - vlan
          - spoofchk
          - trust

    pcie:
      # Sketch of the PCIe topology relevant for media functions
      rootComplexes:
        - id: 0
          domain: "0000"
          # Optional link attributes useful for locality-sensitive placement
          devices:
            - name: "GPU0"
              pciAddress: "0000:65:00.0"
              gen: "Gen4"
              width: "x16"
              numaNode: 0
            - name: "NIC0"
              pciAddress: "0000:a1:00.0"
              gen: "Gen5"
              width: "x16"
              numaNode: 0
        - id: 1
          domain: "0001"
          devices:
            - name: "GPU1"
              pciAddress: "0001:41:00.0"
              gen: "Gen4"
              width: "x16"
              numaNode: 1
            - name: "NIC1"
              pciAddress: "0001:b3:00.0"
              gen: "Gen5"
              width: "x16"
              numaNode: 1

    gpus:
      - vendor: "NVIDIA"
        model: "RTX A4000"
        pciAddress: "0000:41:00.0"
        memory: "16Gi"
        driver: "nvidia"
        # If your MXL DRA driver wants to cross-check against a GPU DeviceClass
        draDeviceClass: "nvidia.com/gpu"
        # Optional: MIG/partitioning or other driver-specific toggles
        capabilities:
          - compute
          - graphics
          - encoder
          - decoder

  domain:
    path: "/mxl/domain1"

  timing:
    latencyBudgetUsec: 500
``
