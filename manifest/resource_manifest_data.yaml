apiVersion: mxl.media.fn/v1alpha1
kind: MxlMediaFunctionParameters
metadata:
  name: writer-anc-smpte291
  label:
    app: media-processing-anc
    function: anc-writer
  namespace: media
spec:
  role: writer
  flow:
    label: "studio-anc-1"


  # Media input specifications
  inputs:
    ancillary:
      format:
        data:
          media_type: video/smpte291

  # Media output specifications
  outputs:
    ancillary:
      format:
        data:
          media_type: video/smpte291

  
  # Resource requirements for the media function
  requirements:
    compute:
      cpu: "200m"                   # Millicores (m): A fractional part of a core. 1 CPU is equal to 1000m. 500m: Half a core (0.5 CPU).100m: One-tenth of a core (0.1 CPU).
      cpu_class: "performance"      # driver-defined tier (e.g., latency|balanced|performance)
      memory: "4Gi"                 # Requests and limits in units as expressed in Kubernetes (e.g., Mi, Gi)


  # NEW: host platform capabilities (inventory/hints for driver-side placement logic)
  reference_platform:
    host_capabilities:
      cpu:
        generation: "Skylake"  # CPU microarchitecture generation (e.g., Skylake, Ice Lake, etc.)
        # Selected CPU features discovered via NFD or cpuid
        features:
          - AVX512F
          - AVX512DQ
          - SGX
  
      network:
        - name: eth0
          bandwidth:
            input:
              min: 15Mb/s
              max: 30Mb/s
            output:
              min: 10Mb/s
              max: 25Mb/s
          features: 
            - jumbo_frames
            - rdma

        - name: eth1
          bandwidth:
            input:
              min: 10Mb/s
              max: 20Mb/s
            output:
              min: 50Mb/s
              max: 150Mb/s
          features:
            - vlan_support
            - link_aggregation

      memory:
        - type: ram
          generation: DDR4
          media_workload:
            size: 1GB
            throughput:
              read: 4GB/s
              write: 3GB/s

        - type: cache
          level: L3
          media_workload:
            size: 128MB
            throughput:
              read: 2GB/s
              write: 1GB/s

      storage:
        - name: nvme_0
          type: nvme # or nvme, ssd, hdd, spinning_disk, etc.
          media_workload:
            size: 4MB
            throughput:
              read: 2000MB/s
              write: 1800MB/s
            latency: 100us  # average access latency
            iops: 100000    # input/output operations per second
